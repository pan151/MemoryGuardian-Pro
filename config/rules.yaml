  # ========================================
  # Custom Rule Example
  # ========================================
  # - name: YourProcess
  #   max_mb: 1000
  #   reason: "Custom process high memory"
  #   kill_cmd: "taskkill /F /IM YourProcess.exe"
  #   auto_kill: false
  #   category: "app"
  #   priority: 3

# Global Settings
global_settings:
  # Enable rule engine
  enabled: true

  # Rule reload interval (seconds) - for dynamic reloading of rule files
  reload_interval_seconds: 300

  # Log rule matches
  log_rule_matches: true

  # Default auto_kill strategy (when not explicitly specified in rules)
  default_auto_kill: false

  # Alert deduplication window (seconds) - same rule won't alert repeatedly in short time
  deduplication_window_seconds: 60
