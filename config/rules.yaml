# ============================================================
# AI Memory Optimizer - High Risk Process Rules
# ============================================================
# Description:
# - name: Process name (without .exe extension)
# - max_mb: Memory threshold in MB, triggers rule when exceeded
# - reason: Alert reason description
# - kill_cmd: Cleanup command, can use {pid} placeholder
# - auto_kill: Whether to auto-kill in AutoKill mode
# - category: Process category (system/app/game/other)
# - priority: Priority level (1-5, 5 is highest)

rules:
  # ========================================
  # Power BI Related
  # ========================================
  - name: msmdsrv
    max_mb: 1500
    reason: "Power BI Analysis Services engine memory leak"
    kill_cmd: "taskkill /F /IM msmdsrv.exe"
    auto_kill: false
    category: "app"
    priority: 5

  - name: Microsoft.PowerBI.EnterpriseGateway
    max_mb: 800
    reason: "Power BI Enterprise Gateway high memory usage"
    kill_cmd: "net stop PBIEgwService"
    auto_kill: false
    category: "app"
    priority: 4

  - name: Microsoft.PowerBI.DataMovement.PersonalGateway
    max_mb: 600
    reason: "Power BI Personal Gateway high memory usage"
    kill_cmd: "net stop pbidatamovement"
    auto_kill: false
    category: "app"
    priority: 4

  - name: PBIDesktop
    max_mb: 2500
    reason: "Power BI Desktop high memory usage"
    kill_cmd: "taskkill /F /PID {pid}"
    auto_kill: false
    category: "app"
    priority: 4

  # ========================================
  # Browser Related
  # ========================================
  - name: chrome
    max_mb: 400
    reason: "Chrome single process memory anomaly"
    kill_cmd: "taskkill /F /PID {pid}"
    auto_kill: false
    category: "app"
    priority: 3

  - name: msedge
    max_mb: 500
