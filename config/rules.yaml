  # ========================================
  # System Services
  # ========================================
  - name: DoSvc
    max_mb: 300
    reason: "Delivery Optimization service anomaly"
    kill_cmd: "net stop DoSvc"
    auto_kill: false
    category: "system"
    priority: 5

  - name: SearchIndexer
    max_mb: 400
