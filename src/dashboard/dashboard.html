<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Guardian Pro - 实时监控 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #1a1f2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 12px;
            padding: 24px 32px;
            margin-bottom: 24px;
            border: 1px solid #2d3748;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #63b3ed;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .header .subtitle {
            color: #a0aec0;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            margin-left: 16px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-ok {
            background: #1c4532;
            color: #68d391;
            border: 1px solid #48bb78;
        }

        .status-warn {
            background: #744210;
            color: #f6e05e;
            border: 1px solid #ecc94b;
        }

        .status-critical {
            background: #742a2a;
            color: #fc8181;
            border: 1px solid #fc8181;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }

        .card:hover {
            border-color: #4a5568;
            transform: translateY(-2px);
        }

        .card .label {
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 32px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .card .unit {
            font-size: 14px;
            color: #a0aec0;
        }

        .card.green .value { color: #68d391; }
        .card.yellow .value { color: #f6e05e; }
        .card.red .value { color: #fc8181; }
        .card.blue .value { color: #63b3ed; }

        .chart-container {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chart-title {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }

        .chart-btn {
            background: #2d3748;
            border: none;
            color: #a0aec0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }

        .chart-btn:hover {
            background: #4a5568;
            color: #e2e8f0;
        }

        .chart-btn.active {
            background: #3182ce;
            color: white;
        }

        .section {
            background: #1a1f2e;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .section h2 {
            font-size: 18px;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .process-table {
            width: 100%;
            border-collapse: collapse;
        }

        .process-table th,
        .process-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }

        .process-table th {
            font-size: 12px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .process-table tr:hover {
            background: #2d3748;
        }

        .tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }

        .tag-danger {
            background: #742a2a;
            color: #fc8181;
        }

        .tag-warn {
            background: #744210;
            color: #f6e05e;
        }

        .tag-info {
            background: #1a365d;
            color: #63b3ed;
        }

        .tag-ok {
            background: #1c4532;
            color: #68d391;
        }

        .action-btn {
            background: #2d3748;
            border: none;
            color: #a0aec0;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            margin-right: 4px;
        }

        .action-btn:hover {
            background: #4a5568;
            color: #e2e8f0;
        }

        .action-btn.primary {
            background: #3182ce;
            color: white;
        }

        .action-btn.primary:hover {
            background: #2b6cb0;
        }

        .action-btn.danger {
            background: #c53030;
            color: white;
        }

        .action-btn.danger:hover {
            background: #9b2c2c;
        }

        .findings-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .finding-item {
            background: #131820;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 16px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .finding-item.critical {
            border-left: 3px solid #fc8181;
        }

        .finding-item.warning {
            border-left: 3px solid #f6e05e;
        }

        .finding-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .finding-content {
            flex: 1;
        }

        .finding-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .finding-desc {
            font-size: 13px;
            color: #a0aec0;
            line-height: 1.6;
        }

        .cmd-box {
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 6px;
            padding: 8px 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #63b3ed;
            margin-top: 8px;
            word-break: break-all;
        }

        .logs-container {
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 10px;
            padding: 16px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-item {
            padding: 4px 0;
            border-bottom: 1px solid #1a202c;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #718096;
        }

        .log-level {
            margin-left: 8px;
            font-weight: 500;
        }

        .log-level.ALERT { color: #fc8181; }
        .log-level.WARN { color: #f6e05e; }
        .log-level.OK { color: #68d391; }
        .log-level.AI { color: #63b3ed; }

        .optimize-section {
            background: linear-gradient(135deg, #1c4532 0%, #1a365d 100%);
            border: 1px solid #48bb78;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .optimize-section h2 {
            color: #68d391;
            margin-bottom: 16px;
        }

        .optimize-btn {
            background: #48bb78;
            border: none;
            color: #0f2215;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .optimize-btn:hover {
            background: #38a169;
            transform: scale(1.02);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #a0aec0;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖥️ Memory Guardian Pro</h1>
            <div class="subtitle">
                实时内存监控系统
                <span id="statusBadge" class="status-badge status-ok">系统正常</span>
            </div>
            <div class="subtitle" style="margin-top: 8px;">
                最后更新: <span id="lastUpdate">--</span>
            </div>
        </div>

        <!-- 概览卡片 -->
        <div class="cards">
            <div class="card" id="memCard">
                <div class="label">内存使用率</div>
                <div class="value"><span id="memPct">--</span>%</div>
                <div class="unit"><span id="memUsed">--</span> GB / <span id="memTotal">--</span> GB</div>
            </div>
            <div class="card yellow">
                <div class="label">告警次数</div>
                <div class="value" id="alertCount">0</div>
                <div class="unit">本会话累计</div>
            </div>
            <div class="card green">
                <div class="label">已释放内存</div>
                <div class="value"><span id="freedMB">0</span> MB</div>
                <div class="unit">本会话累计</div>
            </div>
            <div class="card blue">
                <div class="label">监控时长</div>
                <div class="value"><span id="uptime">0</span></div>
                <div class="unit">分钟</div>
            </div>
        </div>

        <!-- 优化按钮区域 -->
        <div class="optimize-section">
            <h2>⚡ 快速优化操作</h2>
            <button class="optimize-btn" onclick="quickRelease()">释放工作集内存</button>
            <button class="optimize-btn" onclick="fullOptimize()">执行完整优化</button>
            <span id="optStatus" style="margin-left: 16px; color: #a0aec0;"></span>
        </div>

        <!-- 内存趋势图 -->
        <div class="chart-container">
            <div class="chart-header">
                <div class="chart-title">📈 内存使用趋势</div>
                <div>
                    <button class="chart-btn active" onclick="setChartRange(60)">1小时</button>
                    <button class="chart-btn" onclick="setChartRange(30)">30分钟</button>
                    <button class="chart-btn" onclick="setChartRange(15)">15分钟</button>
                </div>
            </div>
            <canvas id="memChart" height="100"></canvas>
        </div>

        <!-- 发现的问题 -->
        <div class="section">
            <h2>🔍 AI 分析结果 <span id="findingCount" class="tag tag-ok">0 个问题</span></h2>
            <div id="findingsList" class="findings-list">
                <div style="text-align: center; color: #718096; padding: 20px;">
                    暂无异常检测
                </div>
            </div>
        </div>

        <!-- Top 进程表 -->
        <div class="section">
            <h2>📊 内存占用 TOP 20 进程</h2>
            <table class="process-table">
                <thead>
                    <tr>
                        <th>进程名</th>
                        <th>PID</th>
                        <th>内存 (MB)</th>
                        <th>CPU</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="processTable">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>

        <!-- 操作日志 -->
        <div class="section">
            <h2>📋 操作日志</h2>
            <div id="logsContainer" class="logs-container">
                <div style="text-align: center; color: #718096; padding: 20px;">
                    加载中...
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let chart;
        let chartRange = 60;
        const UPDATE_INTERVAL = 3000; // 3秒更新一次

        // 初始化图表
        function initChart() {
            const ctx = document.getElementById('memChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '内存使用率 (%)',
                        data: [],
                        borderColor: '#63b3ed',
                        backgroundColor: 'rgba(99, 179, 237, 0.1)',
                        fill: true,
                        tension: 0.4
                    }, {
                        label: '告警阈值',
                        data: [],
                        borderColor: '#f6e05e',
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    }, {
                        label: '危急阈值',
                        data: [],
                        borderColor: '#fc8181',
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            labels: {
                                color: '#a0aec0'
                            }
                        }
                    },
                    scales: {
                        x: {
                            display: true,
                            grid: {
                                color: '#2d3748'
                            },
                            ticks: {
                                color: '#718096'
                            }
                        },
                        y: {
                            display: true,
                            min: 0,
                            max: 100,
                            grid: {
                                color: '#2d3748'
                            },
                            ticks: {
                                color: '#718096',
                                callback: value => value + '%'
                            }
                        }
                    }
                }
            });
        }

        // 设置图表时间范围
        function setChartRange(minutes) {
            chartRange = minutes;
            document.querySelectorAll('.chart-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateData();
        }

        // 获取数据
        async function fetchData() {
            try {
                const response = await fetch('/data');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('获取数据失败:', error);
                return null;
            }
        }

        // 更新界面
        async function updateData() {
            const data = await fetchData();
            if (!data) return;

            // 更新概览卡片
            document.getElementById('memPct').textContent = data.memPct.toFixed(1);
            document.getElementById('memUsed').textContent = data.memUsedGB.toFixed(1);
            document.getElementById('memTotal').textContent = data.memTotalGB.toFixed(1);
            document.getElementById('alertCount').textContent = data.stats.alerts;
            document.getElementById('freedMB').textContent = data.stats.totalFreedMB.toFixed(1);
            document.getElementById('uptime').textContent = Math.floor(data.round * (30 / 60)); // 假设每30秒一轮
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

            // 更新状态徽章
            const badge = document.getElementById('statusBadge');
            const memCard = document.getElementById('memCard');
            if (data.memPct >= 90) {
                badge.className = 'status-badge status-critical';
                badge.textContent = '危急状态';
                memCard.classList.add('red');
            } else if (data.memPct >= 80) {
                badge.className = 'status-badge status-warn';
                badge.textContent = '内存告警';
                memCard.classList.add('yellow');
            } else {
                badge.className = 'status-badge status-ok';
                badge.textContent = '系统正常';
                memCard.classList.remove('red', 'yellow');
            }

            // 更新图表
            const history = data.history.slice(-chartRange);
            chart.data.labels = history.map(h => h.t);
            chart.data.datasets[0].data = history.map(h => h.pct);
            chart.data.datasets[1].data = history.map(() => data.alertPct);
            chart.data.datasets[2].data = history.map(() => data.criticalPct);
            chart.update('none');

            // 更新发现的问题
            updateFindings(data.findings);

            // 更新进程表
            updateProcessTable(data.topProcs);

            // 更新日志
            updateLogs(data.logs);
        }

        // 更新发现的问题
        function updateFindings(findings) {
            const container = document.getElementById('findingsList');
            const countBadge = document.getElementById('findingCount');

            if (findings.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #718096; padding: 20px;">暂无异常检测</div>';
                countBadge.className = 'tag tag-ok';
                countBadge.textContent = '0 个问题';
                return;
            }

            countBadge.className = findings.some(f => f.severity === 'CRITICAL') ? 'tag tag-danger' : 'tag tag-warn';
            countBadge.textContent = `${findings.length} 个问题`;

            container.innerHTML = findings.map(f => `
                <div class="finding-item ${f.severity.toLowerCase()}">
                    <div class="finding-icon">${f.severity === 'CRITICAL' ? '🔴' : '🟡'}</div>
                    <div class="finding-content">
                        <div class="finding-title">${f.name} (PID: ${f.pid}) - ${f.memMB} MB</div>
                        <div class="finding-desc">${f.reason}</div>
                        <div class="cmd-box">${f.killCmd}</div>
                        <div style="margin-top: 12px;">
                            <button class="action-btn danger" onclick="executeAction('${f.killCmd}')">执行清理</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 更新进程表
        function updateProcessTable(processes) {
            const tbody = document.getElementById('processTable');
            tbody.innerHTML = processes.map(p => `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.pid}</td>
                    <td>${p.memMB.toFixed(1)}</td>
                    <td>${p.cpu.toFixed(1)}s</td>
                    <td><span class="tag tag-ok">正常</span></td>
                    <td>
                        <button class="action-btn danger" onclick="executeAction('taskkill /F /PID ${p.pid}')">终止</button>
                    </td>
                </tr>
            `).join('');
        }

        // 更新日志
        function updateLogs(logs) {
            const container = document.getElementById('logsContainer');
            container.innerHTML = logs.slice().reverse().map(l => `
                <div class="log-item">
                    <span class="log-time">${l.time}</span>
                    <span class="log-level ${l.level}">[${l.level}]</span>
                    <span>${l.msg}</span>
                </div>
            `).join('');
        }

        // 执行操作
        async function executeAction(cmd) {
            if (!confirm(`确定要执行此命令吗？\n\n${cmd}`)) {
                return;
            }

            try {
                const response = await fetch('/action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cmd })
                });
                const result = await response.json();

                if (result.ok) {
                    alert('操作成功！');
                } else {
                    alert('操作失败：' + result.output);
                }
            } catch (error) {
                alert('请求失败：' + error.message);
            }
        }

        // 快速释放
        async function quickRelease() {
            const status = document.getElementById('optStatus');
            status.innerHTML = '<span class="loading"></span> 正在释放...';

            try {
                const response = await fetch('/release');
                const result = await response.json();
                status.innerHTML = `✅ 已释放 ${result.freed} MB`;
                setTimeout(() => status.innerHTML = '', 3000);
            } catch (error) {
                status.innerHTML = '❌ 操作失败';
            }
        }

        // 完整优化
        async function fullOptimize() {
            const status = document.getElementById('optStatus');
            status.innerHTML = '<span class="loading"></span> 正在优化...';

            try {
                const response = await fetch('/optimize');
                const result = await response.json();
                status.innerHTML = `✅ 释放 ${result.freedMB} MB 内存，清理 ${result.tempFreed} MB 临时文件`;
                setTimeout(() => status.innerHTML = '', 5000);
            } catch (error) {
                status.innerHTML = '❌ 操作失败';
            }
        }

        // 初始化
        window.onload = function() {
            initChart();
            updateData();
            setInterval(updateData, UPDATE_INTERVAL);
        };
    </script>
</body>
</html>
